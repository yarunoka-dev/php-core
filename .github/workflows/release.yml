name: release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # No checkout: gh operates on the remote repository directly, so the
      # job never executes repository code with a write-scoped token.
      - name: Create GitHub release with generated notes
        run: gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --verify-tag --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
