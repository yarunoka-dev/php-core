name: php-next

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # 2.37.2
        with:
          php-version: '8.6'
          tools: composer:v2
          coverage: none

      - name: Install dependencies from lock files
        run: composer install --no-interaction --no-progress --prefer-dist

      # Run the newest PHPUnit allowed by the constraint so failures point
      # at this library, not at an outdated test runner
      - name: Update PHPUnit to the latest release
        run: composer bin phpunit update --no-interaction --no-progress

      - name: Run tests
        run: vendor/bin/phpunit
